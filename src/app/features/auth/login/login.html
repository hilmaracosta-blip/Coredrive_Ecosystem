<header class="bg-white shadow-sm py-4 px-6 flex justify-between items-center">
  <a routerLink="/">
    <img src="Logo_Coredrive.png" alt="Coredrive Logo" class="w-56">
  </a>
  <a routerLink="/" class="border border-gray-200 text-[#004d2e] px-5 py-2 rounded-full text-[10px] font-extrabold uppercase tracking-[0.15em] hover:border-[#d4af37] hover:text-[#d4af37] transition-all">
    Home
  </a>
</header>

<main class="flex flex-col lg:flex-row min-h-[80vh]">
  <!-- Carousel 60% -->
  <div class="lg:w-3/5 bg-[#004d2e] flex items-center justify-center p-10">
    <app-carousel [slides]="slides"></app-carousel>
  </div>

  <!-- Formulário 40% -->
  <div class="lg:w-2/5 flex items-center justify-center p-8">
    <form (ngSubmit)="onSubmit()" class="w-full max-w-sm">
      <h2 class="text-2xl font-extrabold text-[#004d2e] mb-6 text-center">Acessar minha conta</h2>

      <!-- Seletor de tipo de usuário -->
      <div class="flex flex-wrap gap-2 mb-6 justify-center">
        <button *ngFor="let tipo of tiposUsuario" type="button"
                (click)="selecionarTipo(tipo)"
                [ngClass]="tipoSelecionado === tipo ? 'bg-[#004d2e] text-white' : 'text-[#004d2e]'"
                class="border border-[#004d2e] px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wide transition-all">
          {{ tipo.label }}
        </button>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-semibold text-gray-700 mb-1">Usuário</label>
        <input type="text" [(ngModel)]="usuario" name="usuario" required
               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-[#004d2e]"
               placeholder="Digite seu usuário">
      </div>

      <div class="mb-4">
        <label class="block text-sm font-semibold text-gray-700 mb-1">Senha</label>
        <input type="password" [(ngModel)]="senha" name="senha" required
               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-[#004d2e]"
               placeholder="Digite sua senha">
      </div>

      <div class="mb-6 flex items-start gap-2">
        <input type="checkbox" [(ngModel)]="aceiteLgpd" name="aceiteLgpd" id="lgpd" class="mt-1">
        <label for="lgpd" class="text-xs text-gray-600">
          Li e aceito o tratamento dos meus dados conforme a
          <a href="https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm"
             target="_blank" rel="noopener" class="text-[#004d2e] underline font-semibold">
            LGPD (Lei nº 13.709/2018)
          </a>.
        </label>
      </div>

      <p *ngIf="erroLogin" class="text-red-600 text-sm mb-4 text-center">{{ erroLogin }}</p>

      <button type="submit" [disabled]="!aceiteLgpd"
              class="w-full py-3 rounded-full text-sm font-extrabold uppercase tracking-widest transition-all
                     bg-[#004d2e] text-white
                     enabled:hover:bg-[#d4af37] enabled:hover:text-[#004d2e] enabled:hover:scale-105
                     disabled:opacity-40 disabled:cursor-not-allowed">
        Entrar
      </button>
    </form>
  </div>
</main>

<footer class="bg-[#004d2e] text-white py-8 px-6">
  <div class="container mx-auto flex flex-col items-center gap-4">
    <div class="flex items-center gap-3">
      <span class="text-sm font-semibold">Redes Sociais:</span>
      <a href="#" aria-label="Facebook"><img src="Facebook.png" alt="Facebook" class="w-6 h-6"></a>
      <a href="#" aria-label="Instagram"><img src="Instagram.png" alt="Instagram" class="w-6 h-6"></a>
      <a href="#" aria-label="WhatsApp"><img src="WhatsApp.png" alt="WhatsApp" class="w-6 h-6"></a>
      <a href="#" aria-label="YouTube"><img src="YouTube.png" alt="YouTube" class="w-6 h-6"></a>
    </div>
    <p class="text-xs text-gray-300 text-center">
      © 2026 Coredrive Ecosystem - Criado por Hilmara Santos - Todos os direitos reservados.
    </p>
  </div>
</footer>
