<nav class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm flex justify-between items-center pl-6 pr-1 py-4">
  <img src="Logo_Coredrive.png" alt="Coredrive Logo" class="w-48 md:w-64 flex-shrink-0">
  <div class="flex flex-wrap justify-end items-center gap-4">
    <a routerLink="/contato" class="border border-gray-200 text-[#004d2e] px-6 py-2.5 rounded-full text-[11px] font-extrabold uppercase tracking-[0.15em] hover:border-[#d4af37] hover:text-[#d4af37] transition-all">Contato</a>
    <a routerLink="/login" class="border border-gray-200 text-[#004d2e] px-6 py-2.5 rounded-full text-[11px] font-extrabold uppercase tracking-[0.15em] hover:border-[#d4af37] hover:text-[#d4af37] transition-all">Login</a>
  </div>
</nav>

<header class="relative h-[110vh] flex flex-col items-center text-center overflow-hidden bg-[#004d2e]">
  <video #videoFundo autoplay muted loop playsinline class="absolute z-10 w-auto min-w-full min-h-full max-w-none object-cover opacity-30">
    <source src="Video-logistica.mp4" type="video/mp4">
  </video>

  <!-- Barra de controles estilo YouTube: aparece só no hover -->
  <div class="video-controls absolute bottom-0 left-0 right-0 z-40 h-20 bg-gradient-to-t from-black/70 to-transparent transition-opacity duration-300 flex items-end justify-end pb-4 pr-5 gap-3">
    <button (click)="togglePlayPause()" class="text-white hover:scale-110 transition-transform w-9 h-9 flex items-center justify-center">
      <svg *ngIf="videoPausado" viewBox="0 0 24 24" fill="currentColor" class="w-7 h-7">
        <path d="M8 5v14l11-7z"/>
      </svg>
      <svg *ngIf="!videoPausado" viewBox="0 0 24 24" fill="currentColor" class="w-7 h-7">
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
      </svg>
    </button>

    <button (click)="toggleSom()" class="text-white hover:scale-110 transition-transform w-9 h-9 flex items-center justify-center">
      <svg *ngIf="somAtivado" viewBox="0 0 24 24" fill="currentColor" class="w-7 h-7">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>
      <svg *ngIf="!somAtivado" viewBox="0 0 24 24" fill="currentColor" class="w-7 h-7">
        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
      </svg>
    </button>
  </div>

  <div class="container mx-auto px-6 relative z-30 mt-60">
    <h1 class="text-5xl md:text-7xl font-extrabold mb-4 italic text-white tracking-tighter">
      Sua empresa é realmente <span class="text-[#d4af37]">sustentável?</span>
    </h1>
    <p class="text-lg md:text-xl text-gray-200 max-w-2xl mx-auto mb-10 font-light tracking-wide">
      Consultoria estratégica em Logística Reversa. <br>
      <span class="font-semibold text-white">Logística reversa é o caminho de volta: transformar o resíduo de hoje no recurso de amanhã.</span>
    </p>
  </div>
</header>

<footer class="bg-[#004d2e] text-white py-8 px-6">
  <div class="container mx-auto flex flex-col items-center gap-4">
    <div class="flex items-center gap-3">
      <span class="text-sm font-semibold">Redes Sociais:</span>
      <a href="#" aria-label="Facebook"><img src="Facebook.png" alt="Facebook" class="w-6 h-6"></a>
      <a href="#" aria-label="Instagram"><img src="Instagram.png" alt="Instagram" class="w-6 h-6"></a>
      <a href="#" aria-label="WhatsApp"><img src="WhatsApp.png" alt="WhatsApp" class="w-6 h-6"></a>
      <a href="#" aria-label="YouTube"><img src="YouTube.png" alt="YouTube" class="w-6 h-6"></a>
    </div>
    <p class="text-xs text-gray-300 text-center">
      © 2026 Coredrive Ecosystem - Criado por Hilmara Santos - Todos os Direitos Reservados.
    </p>
  </div>
</footer>
